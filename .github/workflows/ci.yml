name: CI

on:
  pull_request:
  push:
    branches:
      - "**"

jobs:
  backend:
    name: Backend build and tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: stock_control
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d stock_control"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      PORT: 3333
      DATABASE_HOST: 127.0.0.1
      DATABASE_PORT: 5433
      DATABASE_NAME: stock_control
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5433/stock_control
      JWT_SECRET: ci-test-secret-change-me
      JWT_EXPIRES_IN: 8h

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build backend
        run: npm run build

      - name: Prepare test database
        run: |
          npm run db:migrate
          npm run db:seed:admin

      - name: Run backend test suite
        run: npm test

  web:
    name: Web build
    runs-on: ubuntu-latest
    env:
      WEB_SESSION_SECRET: ci-build-only-secret-with-32-chars-min
      STOCK_CONTROL_API_URL: http://127.0.0.1:3333
      NEXT_PUBLIC_STOCK_CONTROL_API_URL: http://127.0.0.1:3333

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Build web
        working-directory: apps/web
        run: npm run build
